# ============================================================
# GitHub Actions - Build & Deploy Backend to AWS EC2
# Triggered on push to main branch (backend paths only)
# ============================================================

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'pkg/**'
      - 'Dockerfile'
      - 'deploy/**'
      - 'go.mod'
      - 'go.sum'

  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ---- Job 1: Build & Push Docker Images ----
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - api-gateway
          - analytics-service
          - authentication-service
          - user-service
          - asset-service
          - prediction-service
          - maintenance-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image prefix
        id: vars
        run: echo "image_prefix=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/backend-gmao" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ steps.vars.outputs.image_prefix }}-${{ matrix.service }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ steps.vars.outputs.image_prefix }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Job 2: Deploy to EC2 ----
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml"
          target: "~/deploy"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            export PATH=$PATH:/usr/bin:/usr/local/bin:/snap/bin

            # ---- Install Docker if not present ----
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
              echo "Docker installed successfully."
            fi

            # Ensure docker is usable without re-login (newgrp would exit the script)
            if ! docker info &> /dev/null; then
              echo "Running docker commands with sudo..."
              DOCKER_CMD="sudo docker"
            else
              DOCKER_CMD="docker"
            fi

            mkdir -p ~/deploy
            cd ~/deploy

            # Login to GitHub Container Registry
            echo "$GITHUB_TOKEN" | $DOCKER_CMD login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set environment variables for docker-compose
            export DOCKER_REGISTRY="ghcr.io"
            export DOCKER_IMAGE_PREFIX="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/backend-gmao"
            export IMAGE_TAG="${{ github.sha }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export POSTGRES_DB="${{ secrets.POSTGRES_DB }}"

            # Pull latest images
            $DOCKER_CMD compose -f docker-compose.prod.yml pull

            # Stop and restart all services
            $DOCKER_CMD compose -f docker-compose.prod.yml down --remove-orphans
            $DOCKER_CMD compose -f docker-compose.prod.yml up -d

            # Wait for services to start
            sleep 15

            # Health check the gateway
            echo "Running health check..."
            curl -sf http://localhost:8080/health || echo "WARNING: Gateway health check failed"

            # Clean up old images
            $DOCKER_CMD image prune -f

